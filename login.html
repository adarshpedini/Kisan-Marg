<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Kisan Marg</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <div class="phone-frame">
      <div class="topbar">
        <a class="back-btn" href="index.html">←</a>
        <h1 data-i18n="loginHeader">Login</h1>
        <div class="lang-switch">
          <button class="lang-btn" data-lang-btn="en">EN</button>
          <button class="lang-btn" data-lang-btn="hi">हिं</button>
          <button class="lang-btn" data-lang-btn="mr">मरा</button>
        </div>
      </div>
      <div class="auth-hero">
        <div class="auth-title" data-i18n="loginTitle">Login to Kisan Marg</div>
        <div class="auth-sub">Enter as a farmer or admin. This is designed like a real mobile app screen that can later be wrapped for Android.</div>
      </div>
      <div class="content auth-body">
        <form class="form-card" id="loginForm">
          <div class="input-group">
            <label data-i18n="loginEmail">Email or Phone</label>
            <input class="input" type="text" placeholder="98765 43210" />
          </div>
          <div class="input-group">
            <label data-i18n="loginPassword">Password</label>
            <input class="input" type="password" placeholder="Enter password" />
          </div>
          <div class="input-group">
            <label data-i18n="loginRole">Login As</label>
            <select class="select" name="role">
              <option>Farmer</option>
              <option>Admin</option>
            </select>
          </div>
          <div class="btn-row">
            <button class="btn" type="submit" data-i18n="loginBtn">Login</button>
            <a class="btn-secondary" href="signup.html" data-i18n="signupBtn">Signup</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
