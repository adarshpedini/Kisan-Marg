<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market - Kisan Marg</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="market">
  <div class="page-shell">
    <div class="phone-frame">
      <div class="topbar">
        <a class="back-btn" href="dashboard.html">←</a>
        <h1 data-i18n="marketHeader">Market Prices</h1>
        <div class="lang-switch">
          <button class="lang-btn" data-lang-btn="en">EN</button>
          <button class="lang-btn" data-lang-btn="hi">हिं</button>
          <button class="lang-btn" data-lang-btn="mr">मरा</button>
        </div>
      </div>
      <div class="content">
        <section class="market-page">
          <div class="market-header-section">
            <h2 data-i18n="marketHeader">Market Prices</h2>
            <p data-i18n="marketSub">Live mandi rates from Indian agricultural markets</p>
            <div class="market-controls">
              <select class="market-select" id="marketCropSelect" aria-label="Crop">
                <option value="Wheat">Wheat / गेहूं</option>
                <option value="Rice">Rice / चावल</option>
                <option value="Soyabean">Soyabean / सोयाबीन</option>
                <option value="Cotton">Cotton / कपास</option>
                <option value="Onion">Onion / प्याज</option>
                <option value="Tomato">Tomato / टमाटर</option>
                <option value="Maize">Maize / मक्का</option>
                <option value="Potato">Potato / आलू</option>
              </select>
              <select class="market-select" id="marketStateSelect" aria-label="State">
                <option value="">All India</option>
                <option value="Maharashtra">Maharashtra</option>
                <option value="Madhya Pradesh">Madhya Pradesh</option>
                <option value="Punjab">Punjab</option>
                <option value="Uttar Pradesh">Uttar Pradesh</option>
                <option value="Rajasthan">Rajasthan</option>
                <option value="Karnataka">Karnataka</option>
                <option value="Gujarat">Gujarat</option>
                <option value="Haryana">Haryana</option>
              </select>
            </div>
          </div>

          <div id="market-status" class="loading-state hidden"></div>
          <div id="market-error" class="alert-banner warning hidden"></div>

          <div class="best-deal">
            <div class="best-deal-title" data-i18n="bestPriceToday">Best Price Today</div>
            <div class="best-deal-price" id="bestRateValue">--</div>
            <div class="best-deal-sub" id="bestRateSub">Live mandi comparison will appear here.</div>
          </div>

          <div class="market-card">
            <div class="market-card-header">
              <div class="crop-name" id="market-card-title">Wheat</div>
              <div class="live-badge"><span>●</span><span data-i18n="marketLiveBadge">Live</span></div>
            </div>
            <div style="overflow-x:auto;">
              <table class="price-table">
                <thead>
                  <tr>
                    <th data-i18n="marketTableMarket">Market</th>
                    <th data-i18n="marketTableLocation">Location</th>
                    <th data-i18n="marketMinPrice">Min</th>
                    <th data-i18n="marketModalPrice">Modal</th>
                    <th data-i18n="marketMaxPrice">Max</th>
                  </tr>
                </thead>
                <tbody id="marketTableBody"></tbody>
              </table>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-title" data-i18n="marketCompareTitle">Top market comparison</div>
            <div class="bar-chart" id="trendBars"></div>
          </div>
        </section>
      </div>
      <div class="bottom-nav">
        <a class="nav-item" data-page="home" href="index.html"><span class="nav-icon">🏠</span><span data-i18n="navHome">Home</span></a>
        <a class="nav-item" data-page="market" href="market.html"><span class="nav-icon">📈</span><span data-i18n="navMarket">Market</span></a>
        <a class="nav-item" data-page="assistant" href="ai-assistant.html"><span class="nav-icon">🤖</span><span data-i18n="navAi">AI</span></a>
        <a class="nav-item" data-page="profile" href="profile.html"><span class="nav-icon">👤</span><span data-i18n="navProfile">Profile</span></a>
      </div>
    </div>
  </div>
  <script src="data.js"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
